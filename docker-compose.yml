# SimpleStock — 개인 자산 추적
# 사용: docker compose up -d
# 접속: http://localhost:50000 (simpleStock 기본 포트; .env의 PORT로 변경 가능)

services:
  app:
    build:
      context: .
      args:
        # 통합 nginx 게이트웨이 뒤에 둘 때 prefix(/simpleStock) 를 빌드 타임에 주입.
        # 단독 실행 시에는 빈 값으로 두면 / 루트로 동작.
        VITE_BASE_PATH: "${VITE_BASE_PATH:-}"
    image: simple-stock-app
    ports:
      - "${PORT:-50000}:${PORT:-50000}"
    volumes:
      - ./data:/app/data
    environment:
      PORT: "${PORT:-50000}"
      APP_ACCESS_TOKEN: "${APP_ACCESS_TOKEN:-}"
      LOG_REQUEST_BODY: "${LOG_REQUEST_BODY:-false}"
      TZ: "${TZ:-Asia/Seoul}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Seoul}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-3.5-flash}"
      GEMINI_SUPERVISOR_MODEL: "${GEMINI_SUPERVISOR_MODEL:-gemini-3.5-flash}"
      GEMINI_INCLUDE_THOUGHTS: "${GEMINI_INCLUDE_THOUGHTS:-true}"
      GEMINI_THINKING_BUDGET: "${GEMINI_THINKING_BUDGET:-2048}"
      GEMINI_TIMEOUT_MS: "${GEMINI_TIMEOUT_MS:-90000}"
      GEMINI_SUPERVISOR_TIMEOUT_MS: "${GEMINI_SUPERVISOR_TIMEOUT_MS:-45000}"
      GEMINI_MAX_RETRIES: "${GEMINI_MAX_RETRIES:-2}"
      GEMINI_RETRY_BASE_MS: "${GEMINI_RETRY_BASE_MS:-1500}"
      MANAGER_BRIEF_PRESET_SCHEDULE: "${MANAGER_BRIEF_PRESET_SCHEDULE:-true}"
      AI_DAILY_CRON: "${AI_DAILY_CRON:-}"
      MARKET_DATA_ENABLED: "${MARKET_DATA_ENABLED:-true}"
      MARKET_DATA_PROVIDER: "${MARKET_DATA_PROVIDER:-finnhub}"
      MARKET_US_PROVIDER: "${MARKET_US_PROVIDER:-finnhub}"
      MARKET_KR_PROVIDER: "${MARKET_KR_PROVIDER:-public-data-portal}"
      MARKET_FX_PROVIDER: "${MARKET_FX_PROVIDER:-yahoo-finance}"
      MARKET_REFRESH_INTERVAL_MS: "${MARKET_REFRESH_INTERVAL_MS:-60000}"
      MARKET_QUOTE_TTL_MS: "${MARKET_QUOTE_TTL_MS:-60000}"
      MARKET_KR_QUOTE_TTL_MS: "${MARKET_KR_QUOTE_TTL_MS:-21600000}"
      MARKET_KR_BAS_DT_LOOKBACK_DAYS: "${MARKET_KR_BAS_DT_LOOKBACK_DAYS:-2}"
      MARKET_KR_QUOTA_BACKOFF_MS: "${MARKET_KR_QUOTA_BACKOFF_MS:-1800000}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      PUBLIC_DATA_API_KEY: "${PUBLIC_DATA_API_KEY:-}"
      USD_KRW_FALLBACK_RATE: "${USD_KRW_FALLBACK_RATE:-1360}"
    restart: unless-stopped
